name: Secret scan (reusable)

# Reusable secret-scanning workflow for any Meowmoir repo. Call it from a repo with:
#
#   jobs:
#     secrets:
#       uses: meowmoir/.github/.github/workflows/secret-scan.yml@main
#
# Uses the gitleaks CLI via its container image (no org license needed, unlike the
# gitleaks GitHub Action). Fails the job if any secret is detected.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect --source=/repo --redact -v
